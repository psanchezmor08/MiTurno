services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  app:
    image: python:3.11-slim
    container_name: miturno_app
    ports:
      - "8505:8505"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - PYTHONUNBUFFERED=1
    # ESTO ES LO IMPORTANTE: 
    # Mapea los archivos descargados de GitHub (./) al interior del contenedor (/app)
    volumes:
      - .:/app
    working_dir: /app
    command: >
      sh -c "
      if [ -f requirements.txt ]; then pip install -r requirements.txt; 
      else pip install streamlit pandas langchain_community requests; fi &&
      streamlit run MiTurno.py --server.port=8505 --server.address=0.0.0.0 --server.headless=true"
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
